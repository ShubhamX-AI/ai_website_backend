<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$escaped_subject</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #edf2f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1e293b;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background: linear-gradient(180deg, #e2e8f0 0%, #f8fafc 100%); padding: 32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 640px; background-color: #ffffff; border: 1px solid #dbe4ee; border-radius: 18px; overflow: hidden; box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);">
            <tr>
              <td style="padding: 28px 32px; background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);">
                <p style="margin: 0 0 10px; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #bfdbfe;">Indus Net Assistant</p>
                <h1 style="margin: 0; font-size: 28px; line-height: 1.2; font-weight: 700; color: #ffffff;">$escaped_heading</h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom: 24px; background-color: #eff6ff; border: 1px solid #bfdbfe; border-radius: 14px;">
                  <tr>
                    <td style="padding: 18px 20px; font-size: 15px; line-height: 1.6; color: #1e3a8a;">
                      <p style="margin: 0 0 12px; font-weight: 600;">$escaped_greeting</p>
                      $escaped_context_line
                    </td>
                  </tr>
                </table>

                <h2 style="margin: 0 0 14px; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #475569;">Key Points</h2>
                <ul style="margin: 0; padding-left: 22px; font-size: 15px; line-height: 1.7; color: #0f172a;">
                  $bullet_points_html
                </ul>
              </td>
            </tr>
            <tr>
              <td style="padding: 18px 32px 24px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #64748b;">
                Shared by Indus Net Assistant.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
